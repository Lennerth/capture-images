version: '3.8'

services:
  capture-app:
    build: .
    container_name: camera-capture
    restart: always
    env_file:
      - .env
    environment:
      - NVR_HOST=${NVR_HOST:-192.168.1.229}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - capture_data:/data
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck.sh"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  capture_data:
