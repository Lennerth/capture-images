timezone: "Europe/Brussels"
capture_interval_seconds: 300
upload_time: "00:05"
capture_window:
  start: "05:00"
  end: "19:00"

retry:
  camera_backoff_start_seconds: 30
  camera_backoff_max_seconds: 300
  network_backoff_start_seconds: 60
  network_backoff_max_seconds: 3600
  upload_max_retries: 3
  upload_retry_spacing_seconds: 60
  max_consecutive_camera_failures: 10

disk:
  min_free_disk_mb: 500
  retention_days: 7

nvr:
  host: "192.168.1.229"
  rtsp_port: 554
  username: ""
  password: ""   # prefer NVR_PASSWORD env var; this is fallback only
  url_template: "rtsp://{user}:{password}@{host}:{port}/cam/realmonitor?channel={channel}&subtype={subtype}"
  default_subtype: 0

cameras:
  - id: cam01
    name: "Hoboken North"
    type: nvr_rtsp
    channel: 1
    subtype: 0
    timeout_seconds: 15
  - id: cam02
    name: "Hoboken Central"
    type: nvr_rtsp
    channel: 2
    subtype: 0
    timeout_seconds: 15
  - id: cam03
    name: "Hoboken South"
    type: nvr_rtsp
    channel: 3
    subtype: 0
    timeout_seconds: 15

s3:
  endpoint_url: "https://s3.slices-be.eu"
  bucket: "ilabt.imec.be-project-coock-aida"
  base_path: "Werf Hoboken/timelapses"

local_storage:
  path: "/data/images"
  state_path: "/data/state"
